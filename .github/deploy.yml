name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull bhoomika1611/agri-ai
            docker stop agri-container || true
            docker rm agri-container || true
            docker run -d -p 8501:8501 --name agri-container bhoomika1611/agri-ai