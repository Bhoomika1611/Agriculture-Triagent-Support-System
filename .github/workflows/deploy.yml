name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Get code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build & Push Image
    - name: Build and Push Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/agri-ai .
        docker push ${{ secrets.DOCKER_USERNAME }}/agri-ai

    # 4. Deploy on EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: 3.89.4.191
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/agri-ai
          docker stop $(docker ps -q) || true
          docker rm $(docker ps -a -q) || true
          docker run -d -p 80:8501 --env-file .env ${{ secrets.DOCKER_USERNAME }}/agri-ai
